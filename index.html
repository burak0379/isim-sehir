  #confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
  .conf{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
  @media (max-width:400px){.qline .cat{width:100px;font-size:12px}.codechar{width:44px;height:56px;font-size:30px}}
</style>

function trCap(w){ return (w||"").charAt(0).toLocaleUpperCase("tr")+(w||"").slice(1); }
function humanIds(r){ return Object.keys(r.players||{}).filter(id=>!(r.players[id]&&r.players[id].isBot)); }
function botCandidates(c,letter){
  const f=firstChar(letter); let pool=[];
  if(c.list && LISTS[c.list]) pool=LISTS[c.list].split(/\s+/);
  else if(BOT_SEED[c.id]) pool=BOT_SEED[c.id].split(/\s+/);
  return pool.filter(w=>firstChar(w)===f);
}

/* ---- Doğrulama (hibrit) ---- */
function localVerdict(cat,letter,word){
  if(!word) return false;
  if(firstChar(word)!==firstChar(letter)) return false;
  if(cat.list && LISTSET[cat.list]){
    if(LISTSET[cat.list].has(trNorm(word))) return true;
    if(!cat.open) return false;
    return null;
  }
  return null;
}
function withTimeout(p,ms){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),ms))]);}
async function askAI(need){
  const sys='Sen "İsim Şehir" oyununda hakemsin. Harf ve (kategori, kelime) çiftleri için, kelimenin o kategoriye ait GERÇEK ve GEÇERLİ bir cevap olup olmadığını değerlendir. Kelime verilen harfle başlamalı. Türkçe cevapları esas al, yazım/aksan hatalarını hoş gör. Ünlü ve markalar gerçekten var olmalı; uydurma geçersiz. SADECE geçerli JSON dizi döndür, başka metin yok. Format: [{"i":0,"ok":true},{"i":1,"ok":false}]';
  const usr="Kontrol:\n"+need.map((it,idx)=>`${idx}. Harf: ${it.letter} | Kategori: ${it.cat} | Kelime: "${it.word}"`).join("\n");
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:sys+"\n\n"+usr}]})});
  const data=await resp.json();
  let t=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim().replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=t.indexOf("["),b=t.lastIndexOf("]"); if(a>=0&&b>=0)t=t.slice(a,b+1);
  const arr=JSON.parse(t); const out=new Array(need.length).fill(true);
  arr.forEach(o=>{if(o&&typeof o.i==="number"&&typeof o.ok==="boolean")out[o.i]=o.ok;}); return out;
}

/* ================= Firebase katmanı ================= */
let db=null, serverOffset=0;
const state={ myId:Math.random().toString(36).slice(2,10), name:"", code:"", room:null };
let hostBusy=false, iSubmitted=false, myAnswers={}, lastPlayN=null, jokerUsed=false, jokerHint=null, slotAnimatedFor=null;
const ui={screen:null, roundN:null};

if(configReady()){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    db.ref(".info/serverTimeOffset").on("value",s=>serverOffset=(s.val()||0));
  }catch(e){ db=null; }
}
function now(){return Date.now()+serverOffset;}
function roomRef(){return db.ref("rooms/"+state.code);}
function amHost(){return state.room && state.room.host===state.myId;}
const SV_TS = ()=> firebase.database.ServerValue.TIMESTAMP;

function genCode(){let s="";for(let i=0;i<4;i++)s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];return s;}

async function createRoom(){
  if(!state.name){alert("Önce bir isim yaz.");return;}
  try{
    let code, tries=0;
    do{ code=genCode(); tries++; const snap=await db.ref("rooms/"+code).once("value"); if(!snap.exists())break; }while(tries<6);
    state.code=code;
    await roomRef().set({
      host:state.myId, status:"lobby", createdAt:SV_TS(),
      settings:{rounds:5,timer:90,modes:{cifte:true,joker:true,ipucu:true,bomba:true,surpriz:true,tema:true,seri:true}},
      players:{ [state.myId]:{name:state.name,color:AV_COLORS[0],score:0,joinedAt:SV_TS()} }
    });
    attachRoom();
  }catch(e){ alert("Oda kurulamadı: "+((e&&e.message)||e)); }
}
async function joinRoom(){
  if(!state.name){alert("Önce bir isim yaz.");return;}
  const code=(state.code||"").toUpperCase();
  if(code.length<4){alert("4 haneli oda kodunu gir.");return;}
  state.code=code;
  try{
    const snap=await db.ref("rooms/"+code).once("value");
    if(!snap.exists()){alert("Böyle bir oda yok. Kodu kontrol et.");return;}
    const r=snap.val();
    if(r.status!=="lobby"){alert("Bu odada oyun başlamış, lobiye katılınamıyor.");return;}
    const idx=Object.keys(r.players||{}).length;
    await roomRef().child("players/"+state.myId).set({name:state.name,color:AV_COLORS[idx%AV_COLORS.length],score:0,joinedAt:SV_TS()});
    attachRoom();
  }catch(e){ alert("Katılınamadı: "+((e&&e.message)||e)); }
}
function attachRoom(){
  roomRef().child("players/"+state.myId).onDisconnect().remove();
  roomRef().on("value",snap=>{
    const r=snap.val();
    if(!r){ // oda silindi
      state.room=null; state.code=""; alert("Oda kapandı."); ui.screen=null; render(); return;
    }
    state.room=r;
    if(amHost()) hostReact();
    render();
  });
}
function leaveRoom(){
  if(state.code){ roomRef().child("players/"+state.myId).remove(); roomRef().off(); }
  state.code=""; state.room=null; ui.screen=null; render();
}

/* ---- host reaksiyonları ---- */
function hostReact(){
  const r=state.room; if(!r) return;
  if(r.status==="playing") maybeValidate();
  if(r.status==="reveal") applyDisputes();
}
function maybeValidate(){
  const r=state.room; if(hostBusy||r.status!=="playing"||!r.round) return;
  const humans=humanIds(r);
  if(!humans.length) return;
  const sub=r.round.submitted||{};
  const allIn=humans.every(id=>sub[id]);
  const timeUp=r.round.startAt && now()>r.round.startAt+r.settings.timer*1000+1500;
  if(allIn||timeUp){ hostBusy=true; runValidation(); }
}
async function runValidation(){
  await roomRef().child("status").set("validating");
  const r=state.room, cats=(r.round.catIds||[]).map(getCat), cl=r.round.catLetter, players=Object.keys(r.players);
  const ans=Object.assign({},r.round.answers||{});
  // botların cevaplarını üret (listeler + seed havuzları), sonra kaydet
  const botUpd={};
  players.forEach(pid=>{
    if(!r.players[pid].isBot) return;
    ans[pid]=Object.assign({},ans[pid]||{});
    cats.forEach(c=>{
      const L=cl[c.id];
      const skip=Math.random()<(JOKER.has(L)?0.5:0.2);
      let w="";
      if(!skip){ const cands=botCandidates(c,L); if(cands.length) w=trCap(cands[Math.floor(Math.random()*cands.length)]); }
      ans[pid][c.id]=w; botUpd["round/answers/"+pid+"/"+c.id]=w;
    });
    botUpd["round/submitted/"+pid]=true;
  });
  if(Object.keys(botUpd).length){ await roomRef().update(botUpd); r.round.answers=ans; }
  const baseValid={},unver={},need=[];
  players.forEach(pid=>{baseValid[pid]={};unver[pid]={};
    cats.forEach(c=>{const w=(ans[pid]&&ans[pid][c.id])||"";const v=localVerdict(c,cl[c.id],w);
      if(v===true)baseValid[pid][c.id]=true; else if(v===false)baseValid[pid][c.id]=false;
      else{baseValid[pid][c.id]=false;need.push({pid,cid:c.id,letter:cl[c.id],cat:c.name,word:w});}});});
  if(need.length){let verd=null;try{verd=await withTimeout(askAI(need),6000);}catch(e){verd=null;}
    need.forEach((it,idx)=>{ if(verd&&typeof verd[idx]==="boolean")baseValid[it.pid][it.cid]=verd[idx];
      else{baseValid[it.pid][it.cid]=true;unver[it.pid][it.cid]=true;} });}
  const res={baseValid,unver,overrides:{},theme:{}};
  const sc=computeScores(r,res); res.valid=sc.valid; res.cellPts=sc.cellPts; res.roundScore=sc.roundScore;
  await roomRef().child("round/results").set(res);
  await roomRef().child("status").set("reveal");
  hostBusy=false;
}
// Puanı tek yerden hesapla: geçerlilik = baseValid + grup düzeltmeleri(overrides); sonra benzersizlik, joker, bomba, tema
function computeScores(r,res){
  const cats=(r.round.catIds||[]).map(getCat), cl=r.round.catLetter, players=Object.keys(r.players), ans=r.round.answers||{}, modes=r.settings.modes;
  const ov=res.overrides||{}, th=res.theme||{}, bv=res.baseValid||{};
  const valid={};
  players.forEach(pid=>{valid[pid]={};cats.forEach(c=>{
    const key=pid+"__"+c.id;
    let v = bv[pid] ? !!bv[pid][c.id] : false;
    if(Object.prototype.hasOwnProperty.call(ov,key)) v=!!ov[key];
    valid[pid][c.id]=v;
  });});
  const counts={};
  players.forEach(pid=>cats.forEach(c=>{if(valid[pid][c.id]){const k=c.id+"::"+trNorm((ans[pid]&&ans[pid][c.id])||"");counts[k]=(counts[k]||0)+1;}}));
  const cellPts={},roundScore={};
  players.forEach(pid=>{cellPts[pid]={};roundScore[pid]=0;cats.forEach(c=>{
    const w=(ans[pid]&&ans[pid][c.id])||"";let pts=0;
    if(valid[pid][c.id]){const k=c.id+"::"+trNorm(w);pts=counts[k]>1?5:10;if(modes.joker&&JOKER.has(cl[c.id]))pts*=2; if(th[pid]&&th[pid][c.id])pts+=3;}
    else if(modes.bomba&&c.id===r.round.bomb&&!w)pts=-5;
    cellPts[pid][c.id]=pts;roundScore[pid]+=pts;
  });});
  return {valid,cellPts,roundScore};
}
function applyDisputes(){
  const r=state.room; if(hostBusy||!r.round||!r.round.results) return;
  const disp=r.round.disputes||{};
  const solo=humanIds(r).length<=1;
  let hit=null;
  for(const key in disp){ const d=disp[key]; if(!d) continue;
    const ap=d.approvals||{};
    if(solo||Object.keys(ap).some(aid=>ap[aid] && aid!==d.by)){ hit={key,d}; break; } }
  if(!hit) return;
  hostBusy=true;
  const res=r.round.results; res.overrides=res.overrides||{};
  res.overrides[hit.key]=(hit.d.want==="ok");
  const sc=computeScores(r,res); res.valid=sc.valid; res.cellPts=sc.cellPts; res.roundScore=sc.roundScore;
  const upd={}; upd["round/results"]=res; upd["round/disputes/"+hit.key]=null;
  roomRef().update(upd).then(()=>{hostBusy=false;});
}

/* ---- tur kurma (host) ---- */
function buildRound(n){
  const M=state.room.settings.modes;
  let cats=CATS.slice();
  if(M.surpriz) cats=cats.concat([SURPRISE[Math.floor(Math.random()*SURPRISE.length)]]);
  const pool=HARFLER.slice();
  const l1=pool[Math.floor(Math.random()*pool.length)];
  let l2=null; if(M.cifte){do{l2=pool[Math.floor(Math.random()*pool.length)];}while(l2===l1);}
  const catLetter={}; cats.forEach((c,i)=>{catLetter[c.id]=M.cifte?(i<Math.ceil(cats.length/2)?l1:l2):l1;});
  const bomb=M.bomba?cats[Math.floor(Math.random()*cats.length)].id:null;
  const theme=M.tema?THEMES[Math.floor(Math.random()*THEMES.length)]:null;
  return { n, catIds:cats.map(c=>c.id), letters:l2?[l1,l2]:[l1], catLetter, bomb, theme, startAt:SV_TS(),
           answers:{}, submitted:{}, results:null };
}
function hostStart(){ // lobiden başlat
  if(!amHost())return;
  const upd={}; Object.keys(state.room.players).forEach(id=>upd["players/"+id+"/score"]=0);
  upd["prevWinners"]=null; upd["round"]=buildRound(1); upd["status"]="playing";
  roomRef().update(upd);
}
function hostNextRound(){ if(!amHost())return; const n=(state.room.round.n||0)+1; roomRef().update({round:buildRound(n),status:"playing"}); }
function hostFinalize(){ // reveal -> puan tablosu
  if(!amHost())return;
  const r=state.room, res=r.round.results, players=Object.keys(r.players);
  const rs={}; players.forEach(id=>rs[id]=(res.roundScore&&res.roundScore[id])||0);
  const max=Math.max(...players.map(id=>rs[id]));
  const winners={}; players.forEach(id=>{if(rs[id]===max&&max>0)winners[id]=true;});
  const prev=r.prevWinners||{}, streak={};
  if(r.settings.modes.seri&&players.length>=2) players.forEach(id=>{if(winners[id]&&prev[id]){rs[id]+=15;streak[id]=true;}});
  const upd={};
  players.forEach(id=>upd["players/"+id+"/score"]=(r.players[id].score||0)+rs[id]);
  upd["round/results/roundScore"]=rs; upd["round/results/streak"]=streak;
  upd["prevWinners"]=winners; upd["status"]=(r.round.n>=r.settings.rounds)?"gameover":"score";
  roomRef().update(upd);
}
function hostRematch(){ if(!amHost())return; const upd={}; Object.keys(state.room.players).forEach(id=>upd["players/"+id+"/score"]=0); upd["prevWinners"]=null; upd["round"]=null; upd["status"]="lobby"; roomRef().update(upd); }

/* ---- oyuncu aksiyonları ---- */
function submitMine(){
  if(iSubmitted||!state.room||!state.room.round) return;
  iSubmitted=true;
  const upd={};
  (state.room.round.catIds||[]).forEach(cid=>upd["round/answers/"+state.myId+"/"+cid]=((myAnswers[cid]||"").trim()));
  upd["round/submitted/"+state.myId]=true;
  roomRef().update(upd);
  ui.roundN=null; render();
}
window.proposeFlip=(pid,cid,want)=>{
  const key=pid+"__"+cid;
  roomRef().child("round/disputes/"+key).set({by:state.myId,want,approvals:{}});
};
window.approveFlip=(key)=>{ roomRef().child("round/disputes/"+key+"/approvals/"+state.myId).set(true); };
window.cancelFlip=(key)=>{
  const d=state.room.round.disputes&&state.room.round.disputes[key];

window.hostTheme=(pid,cid)=>{
  if(!amHost())return;
  const r=state.room, res=r.round.results; res.theme=res.theme||{}; res.theme[pid]=res.theme[pid]||{};
  res.theme[pid][cid]=!res.theme[pid][cid];

};

/* ================= RENDER ================= */
const app=()=>document.getElementById("app");
function render(){
  if(!configReady()||!db){ app().innerHTML=viewSetupHelp(); ui.screen="help"; return; }
  const r=state.room;
  if(!r){ app().innerHTML=viewHome(); ui.screen="home"; bindHome(); return; }
  const st=r.status;
  if(st==="playing"){
    if(ui.screen==="playing" && ui.roundN===r.round.n){ lightPlaying(); return; }
    ui.screen="playing"; ui.roundN=r.round.n;
    if(lastPlayN!==r.round.n){ lastPlayN=r.round.n; iSubmitted=false; myAnswers={}; jokerUsed=false; jokerHint=null; }
    app().innerHTML=viewPlaying(); mountPlaying(); return;
  }
  ui.screen=st; ui.roundN=r.round?r.round.n:null;
  if(st==="lobby") app().innerHTML=viewLobby();
  else if(st==="validating") app().innerHTML=viewValidating();
  else if(st==="reveal") app().innerHTML=viewReveal();
  else if(st==="score") app().innerHTML=viewScore();
  else if(st==="gameover"){ app().innerHTML=viewGameOver(); confetti(); }
  window.scrollTo(0,0);
}

  const nameOf=(id)=>(r.players[id]&&r.players[id].name)||"?";
  const blocks=cats.map(c=>{
    const L=rd.catLetter[c.id], j=JOKER.has(L), isBomb=M.bomba&&c.id===rd.bomb;
    const cells=players.map(([pid,p])=>{
      const w=(ans[pid]&&ans[pid][c.id])||"";
      const ok=res.valid&&res.valid[pid]&&res.valid[pid][c.id];
      const uv=res.unver&&res.unver[pid]&&res.unver[pid][c.id];
      const themeOn=res.theme&&res.theme[pid]&&res.theme[pid][c.id];
      const key=pid+"__"+c.id;
      const flipped=Object.prototype.hasOwnProperty.call(overrides,key);
      const disp=(res.cellPts&&res.cellPts[pid]&&res.cellPts[pid][c.id])||0;
      const cls=disp>0?"p":(disp<0?"neg":"z");
      let dispute="";
      const d=disputes[key];
      if(d){
        const wl=d.want==="ok"?"doğru say":"yanlış say";
        if(d.by===state.myId) dispute=`<button class="minibtn" onclick="cancelFlip('${key}')" title="geri al">⏳ ${wl}</button>`;
        else if(d.approvals&&d.approvals[state.myId]) dispute=`<span class="minibtn on">✓ onayladın</span>`;
        else dispute=`<button class="minibtn go" onclick="approveFlip('${key}')" title="${esc(nameOf(d.by))}: ${wl}">👍 onayla</button>`;
      } else if(w){
        if(ok) dispute=`<button class="minibtn" onclick="proposeFlip('${pid}','${c.id}','bad')" title="yanlış say (grup onayıyla)">🚩</button>`;
        else dispute=`<button class="minibtn" onclick="proposeFlip('${pid}','${c.id}','ok')" title="doğru say (grup onayıyla)">✋</button>`;
      }
      return `<div class="acell">
        <span class="nm" style="color:${p.color}">${p.isBot?'🤖 ':''}${esc(p.name)}${pid===state.myId?' (sen)':''}</span>
        <span class="wd ${ok?'':'bad'}">${w?esc(w):'<i style="opacity:.5">—</i>'}</span>
        ${uv&&!flipped?'<span class="unv" title="listede yok — grup karar verebilir">?</span>':''}
        ${flipped?'<span class="unv" style="color:var(--cyan);border-color:var(--cyan)" title="grup kararı">👥</span>':''}
        <span class="mark">${ok?'✅':(w?'❌':'⬜')}</span>
        ${host&&M.tema&&ok?`<button class="minibtn ${themeOn?'on':''}" onclick="hostTheme('${pid}','${c.id}')" title="Temaya uyuyor +3">🌍</button>`:(themeOn?'<span class="minibtn on">🌍</span>':'')}
        ${dispute}
        <span class="pts ${cls}">${disp>0?'+':''}${disp}</span>
      </div>`;
    }).join("");
    return `<div class="revcat"><div class="rc-h"><span class="lb ${j?'j':''}">${L}</span>${c.icon} ${c.name}
      ${isBomb?'<span class="tagpill bomb">💣 BOMBA</span>':''}${j?'<span class="tagpill jok">🎯 2×</span>':''}</div>${cells}</div>`;
  }).join("");
  return `
  <div class="brand"><h1 style="font-size:20px">TUR ${rd.n} · SONUÇ</h1></div>
  <div class="card" style="padding:11px 14px"><div class="sub">🤝 <b>Grup kararı:</b> ✅ yanında <b>🚩</b> = "yanlış say", ❌ yanında <b>✋</b> = "doğru say". Başka bir oyuncu <b>👍 onayla</b> derse değişir. (Örn. listede olmayan bir isim ❌ olduysa sahibi ✋'e basar, biri onaylar → ✅ olur.)</div></div>
  ${M.tema?`<div class="card" style="padding:11px 14px"><div class="sub">🌍 <b style="color:var(--lime)">Tema: ${esc(rd.theme)}</b> — ${host?'uyan cevabın 🌍 rozetine bas, +3 ver.':'kurucu temaya uyan cevaplara +3 verir.'}</div></div>`:''}
  <div class="card">${blocks}</div>
  <div style="margin-top:14px">
    ${host?`<button class="btn lime" onclick="hostFinalize()">📊 Puan tablosuna geç</button>`:`<div class="waitnote">⏳ Kurucu puan tablosuna geçecek…</div>`}
  </div>
  <div class="foot">✅ tek doğru =10 · aynısı varsa =5 · 🎯 2× · 🌍 +3 · 💣 boş =−5</div>`;
}
window.hostFinalize=hostFinalize;

/* ---- SCORE ---- */
function viewScore(){
  const r=state.room, rd=r.round, res=rd.results, host=amHost(), last=rd.n>=r.settings.rounds;
  const order=Object.entries(r.players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const rows=order.map(([id,p],rank)=>{
    const medal=["🥇","🥈","🥉"][rank]||(rank+1);
    const delta=(res.roundScore&&res.roundScore[id])||0;
    const streak=res.streak&&res.streak[id];
    return `<div class="lb-row ${rank===0?'lead':''} ${id===state.myId?'me':''}">
      <div class="rk">${medal}</div><div class="av" style="background:${p.color}">${initials(p.name)}</div>
      <div class="nm">${p.isBot?'🤖 ':''}${esc(p.name)}<div class="delta">+${delta} bu tur ${streak?'<span class="streakbadge">🔥 SERİ +15</span>':''}</div></div>
      <div class="sc">${p.score||0}</div></div>`;
  }).join("");
  return `
  <div class="brand"><h1 style="font-size:20px">PUAN TABLOSU</h1><small>tur ${rd.n} / ${r.settings.rounds}</small></div>
  <div class="card">${rows}</div>
  <div style="margin-top:16px">
    ${host?(last?`<button class="btn lime" onclick="hostFinalizeToOver()">🏆 Şampiyonu gör</button>`:`<button class="btn" onclick="hostNextRound()">🎲 Sonraki tur</button>`)
          :`<div class="waitnote">⏳ Kurucu ${last?'sonucu açacak':'sonraki turu başlatacak'}…</div>`}
  </div>`;
}
window.hostNextRound=hostNextRound;
window.hostFinalizeToOver=()=>{ if(amHost()) roomRef().child("status").set("gameover"); };

/* ---- GAME OVER ---- */
function viewGameOver(){
  const r=state.room, order=Object.entries(r.players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const champ=order[0][1];
  const rows=order.map(([id,p],i)=>`<div class="lb-row ${i===0?'lead':''} ${id===state.myId?'me':''}">
    <div class="rk">${["🥇","🥈","🥉"][i]||(i+1)}</div><div class="av" style="background:${p.color}">${initials(p.name)}</div>
    <div class="nm">${p.isBot?'🤖 ':''}${esc(p.name)}</div><div class="sc">${p.score||0}</div></div>`).join("");
  return `
  <div class="center" style="min-height:auto">
    <div style="text-align:center;margin-top:8px"><div style="font-size:54px">🏆</div>
      <div class="display" style="font-size:28px;color:#a86c06">${esc(champ.name)}</div>
      <div class="sub">${champ.score||0} puanla ŞAMPİYON!</div></div>
    <div class="card">${rows}</div>
    <div class="row">
      ${amHost()?`<button class="btn cyan" onclick="hostRematch()">🔁 Tekrar (lobi)</button>`:`<div class="waitnote" style="margin:0">Kurucu yeni oyun açabilir</div>`}
      <button class="btn ghost" onclick="leaveRoom()">Çık</button>
    </div>
  </div>`;
}
window.hostRematch=hostRematch;
window.leaveRoom=leaveRoom;
window.submitMine=submitMine;

/* ---- confetti ---- */
function confetti(){const box=document.getElementById("confetti");if(!box||box.dataset.on==="1")return;box.dataset.on="1";box.innerHTML="";
  const cols=["#c9553d","#2b7f86","#6d9134","#c2860f","#d2742a"];
  for(let i=0;i<80;i++){const d=document.createElement("div");d.className="conf";d.style.left=Math.random()*100+"vw";d.style.background=cols[i%cols.length];d.style.animationDuration=(2+Math.random()*2)+"s";d.style.animationDelay=(Math.random()*.6)+"s";box.appendChild(d);}
  setTimeout(()=>{box.innerHTML="";box.dataset.on="0";},4200);}

/* ---- global saat ---- */
setInterval(()=>{
  const r=state.room; if(!r) return;
  if(r.status==="playing"){
    const el=document.getElementById("ptimer"); const rem=remaining();
    if(el){el.textContent=Math.max(0,rem); if(rem<=10)el.classList.add("warn");}
    if(rem<=0 && !iSubmitted && r.round) submitMine();
    if(amHost()) maybeValidate();
  }
  if(r.status==="reveal" && amHost()) applyDisputes();
},1000);

/* ---- başla ---- */
render();
</script>
</body>
</html>
