<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>İsim Şehir · KAOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#150a2e;            /* midnight purple */
    --bg2:#0c0620;
    --panel:#221146;
    --panel2:#2c1858;
    --ink:#f4ecff;
    --muted:#a892d6;
    --magenta:#ff2d95;
    --cyan:#22e6ff;
    --lime:#b6ff3a;
    --gold:#ffd23f;
    --danger:#ff4d5e;
    --line:rgba(255,255,255,.10);
    --shadow:0 18px 50px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Fredoka',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(255,45,149,.28), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, rgba(34,230,255,.20), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(182,255,58,.14), transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    min-height:100vh;
    overflow-x:hidden;
  }
  .display{font-family:'Bungee',cursive}
  #app{max-width:560px;margin:0 auto;padding:18px 16px 40px;min-height:100vh}

  /* ---------- shared bits ---------- */
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 14px}
  .brand h1{font-family:'Bungee',cursive;font-size:26px;margin:0;letter-spacing:1px;line-height:1}
  .brand .k{color:var(--magenta);text-shadow:0 0 18px rgba(255,45,149,.6)}
  .brand small{display:block;text-align:center;color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}

  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
        border-radius:22px;padding:18px;box-shadow:var(--shadow)}
  .card + .card{margin-top:14px}
  .h{font-family:'Bungee',cursive;font-size:15px;letter-spacing:.5px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--muted);font-size:13px;line-height:1.5}

  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  .btn{width:100%;padding:16px;border-radius:16px;font-size:17px;font-weight:700;
       background:linear-gradient(180deg,var(--magenta),#d61277);color:#fff;
       box-shadow:0 10px 26px rgba(255,45,149,.4);transition:transform .08s ease, filter .15s}
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn.cyan{background:linear-gradient(180deg,var(--cyan),#0bb6d6);color:#052229;box-shadow:0 10px 26px rgba(34,230,255,.35)}
  .btn.lime{background:linear-gradient(180deg,var(--lime),#8fe000);color:#173300;box-shadow:0 10px 26px rgba(182,255,58,.3)}
  .btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .btn.sm{padding:11px;font-size:14px;border-radius:12px}
  .btn[disabled]{filter:grayscale(.6) brightness(.7);pointer-events:none}
  .row{display:flex;gap:10px}
  .row>*{flex:1}

  /* ---------- setup ---------- */
  .stepper{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .stepper .val{font-family:'Bungee',cursive;font-size:34px;min-width:64px;text-align:center}
  .rnd{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid var(--line);
       font-size:26px;font-weight:700;color:var(--ink);display:grid;place-items:center}
  .rnd:active{transform:scale(.94)}
  .nameinput{width:100%;padding:13px 14px;border-radius:13px;background:rgba(0,0,0,.25);border:1px solid var(--line);
       color:var(--ink);font-family:inherit;font-size:16px;margin-top:8px}
  .nameinput:focus{border-color:var(--cyan)}
  .pill{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:14px;
        background:rgba(0,0,0,.2);border:1px solid var(--line);margin-top:9px}
  .pill .pt{font-weight:600;font-size:14px;display:flex;gap:9px;align-items:center}
  .pill .pd{color:var(--muted);font-size:11.5px;margin-top:2px}
  .sw{width:50px;height:28px;border-radius:20px;background:#3a2668;position:relative;transition:background .2s;flex:none}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}
  .sw.on{background:linear-gradient(90deg,var(--lime),var(--cyan))}
  .sw.on::after{left:25px}
  .tiny{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}

  /* ---------- draw / slot ---------- */
  .center{min-height:78vh;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .roundtag{text-align:center;color:var(--gold);font-family:'Bungee',cursive;letter-spacing:2px;font-size:14px}
  .slotwrap{display:flex;gap:14px;justify-content:center}
  .slot{width:118px;height:150px;border-radius:24px;display:grid;place-items:center;
        background:linear-gradient(180deg,#fff,#e9e2ff);color:#1a0b3a;
        box-shadow:0 20px 50px rgba(0,0,0,.5),inset 0 -8px 0 rgba(0,0,0,.08);position:relative;overflow:hidden}
  .slot .lt{font-family:'Bungee',cursive;font-size:92px;line-height:1}
  .slot.spin .lt{animation:spin .07s linear infinite}
  @keyframes spin{from{transform:translateY(-8%)}to{transform:translateY(8%)}}
  .slot .tag{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:2px;color:#7a5cc0;font-weight:700}
  .joker-badge{display:inline-flex;gap:6px;align-items:center;justify-content:center;margin:0 auto;
     background:linear-gradient(90deg,var(--gold),#ff9d3f);color:#3a2100;font-weight:700;padding:8px 14px;border-radius:30px;font-size:13px;
     box-shadow:0 8px 22px rgba(255,210,63,.4);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .infoline{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .chip{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:30px;padding:8px 13px;font-size:12.5px;font-weight:600}
  .chip b{color:var(--cyan)}
  .chip.theme b{color:var(--lime)}
  .chip.surprise b{color:var(--magenta)}
  .bombchip{background:rgba(255,77,94,.14);border-color:rgba(255,77,94,.4);color:#ffb3ba}

  /* ---------- countdown ---------- */
  .cd{font-family:'Bungee',cursive;font-size:120px;text-align:center;line-height:1;
      text-shadow:0 0 40px rgba(34,230,255,.5)}
  .cd.warn{color:var(--danger);text-shadow:0 0 40px rgba(255,77,94,.6);animation:pulse .5s infinite}
  .ring{position:relative;width:230px;height:230px;margin:0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .lab{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column}
  .ring .lab span{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

  /* ---------- entry ---------- */
  .passcard{text-align:center;padding:34px 20px}
  .passcard .who{font-family:'Bungee',cursive;font-size:30px;margin:12px 0 6px}
  .avatar{width:74px;height:74px;border-radius:50%;margin:0 auto;display:grid;place-items:center;
          font-family:'Bungee',cursive;font-size:30px;color:#160a2e}
  .entryhead{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent);
             padding:6px 2px 10px;margin:-6px -2px 4px}
  .entryhead .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .entryhead .nm{font-family:'Bungee',cursive;font-size:16px;display:flex;align-items:center;gap:9px}
  .miniclock{font-family:'Bungee',cursive;font-size:20px;color:var(--cyan);min-width:44px;text-align:right}
  .miniclock.warn{color:var(--danger)}
  .qline{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .qline .cat{flex:none;width:118px;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
  .qline .letterbadge{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
       font-family:'Bungee',cursive;font-size:14px;background:rgba(34,230,255,.16);color:var(--cyan)}
  .qline .letterbadge.j{background:rgba(255,210,63,.2);color:var(--gold)}
  .ans{flex:1;min-width:0;padding:11px 12px;border-radius:11px;background:rgba(0,0,0,.28);border:1px solid var(--line);
       color:var(--ink);font-family:inherit;font-size:15px}
  .ans:focus{border-color:var(--magenta);background:rgba(0,0,0,.4)}
  .catmini{font-size:10px;color:var(--muted);display:block;font-weight:400}

  /* ---------- validating ---------- */
  .loader{width:56px;height:56px;border-radius:50%;border:5px solid rgba(255,255,255,.15);
          border-top-color:var(--cyan);margin:8px auto;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- reveal ---------- */
  .revcat{margin-bottom:12px}
  .revcat .rc-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:7px}
  .revcat .rc-h .lb{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-family:'Bungee',cursive;
       font-size:12px;background:rgba(34,230,255,.16);color:var(--cyan)}
  .revcat .rc-h .lb.j{background:rgba(255,210,63,.2);color:var(--gold)}
  .bombtag{margin-left:auto;font-size:10px;background:rgba(255,77,94,.18);color:#ffb3ba;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,77,94,.4)}
  .acell{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:11px;background:rgba(0,0,0,.22);
         border:1px solid var(--line);margin-bottom:6px}
  .acell .nm{font-size:11px;color:var(--muted);width:52px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acell .wd{flex:1;font-size:14.5px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acell .wd.bad{color:var(--muted);text-decoration:line-through;font-weight:400}
  .acell .mark{font-size:15px;flex:none}
  .acell .pts{font-family:'Bungee',cursive;font-size:13px;flex:none;min-width:30px;text-align:right}
  .acell .pts.p{color:var(--lime)} .acell .pts.z{color:var(--muted)} .acell .pts.neg{color:var(--danger)}
  .unv{font-size:9px;color:var(--gold);border:1px solid rgba(255,210,63,.4);border-radius:6px;padding:1px 4px;flex:none}
  .starbtn,.sabbtn{flex:none;font-size:12px;padding:4px 7px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--muted)}
  .starbtn.on{background:rgba(182,255,58,.16);border-color:var(--lime);color:var(--lime)}
  .sabbtn.used{opacity:.3}

  /* ---------- scoreboard ---------- */
  .lb-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;margin-bottom:9px;
          background:rgba(0,0,0,.22);border:1px solid var(--line)}
  .lb-row.lead{background:linear-gradient(90deg,rgba(255,210,63,.18),rgba(255,45,149,.12));border-color:var(--gold)}
  .lb-row .rk{font-family:'Bungee',cursive;font-size:20px;width:30px;flex:none;text-align:center}
  .lb-row .av{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:'Bungee',cursive;font-size:17px;color:#160a2e}
  .lb-row .nm{flex:1;font-weight:600;font-size:16px}
  .lb-row .delta{font-size:12px;color:var(--lime);font-weight:600}
  .lb-row .sc{font-family:'Bungee',cursive;font-size:22px}
  .streakbadge{font-size:10px;background:linear-gradient(90deg,var(--gold),#ff7a3f);color:#3a1c00;padding:2px 7px;border-radius:12px;font-weight:700}

  /* confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
  .conf{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

  .foot{text-align:center;color:var(--muted);font-size:11px;margin-top:18px;opacity:.7}
  @media (max-width:400px){
    .qline .cat,.revcat .rc-h{font-size:12px}
    .qline .cat{width:104px}
    .slot{width:104px;height:132px}.slot .lt{font-size:80px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="confetti"></div>

<script>

    .replace(/Ö/g,"ö").replace(/Ü/g,"ü")

}

/* ----------------------- Gömülü kelime listeleri (offline çekirdek) ----- */

const LISTSET = {};
for(const k in LISTS){ LISTSET[k] = new Set(LISTS[k].split(/\s+/).map(trNorm)); }

/* ----------------------- Ses (Web Audio) ----------------------- */
let AC=null;
function initAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==="suspended") AC.resume(); }
function tone(freq,dur,type,vol){
  if(!AC||!state.settings.sound) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.value=vol||0.14; o.connect(g); g.connect(AC.destination);
  const t=AC.currentTime; o.start(t);
  g.gain.setValueAtTime(vol||0.14,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.stop(t+dur);
}
const S={
  tick:()=>tone(660,0.05,"square",0.05),
  tock:()=>tone(440,0.05,"square",0.05),
  buzz:()=>{tone(140,0.5,"sawtooth",0.16); setTimeout(()=>tone(110,0.5,"sawtooth",0.16),120);},
  spin:()=>tone(300,0.04,"square",0.04),
  land:()=>{tone(520,0.1,"triangle",0.16); setTimeout(()=>tone(780,0.16,"triangle",0.14),90);},
  coin:()=>{tone(900,0.06,"square",0.12); setTimeout(()=>tone(1300,0.1,"square",0.12),60);},
  win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,"triangle",0.16),i*110));},
  bad:()=>tone(180,0.25,"sawtooth",0.12),
  click:()=>tone(600,0.03,"square",0.06),
};

window.chgPlayers=(d)=>{ syncNames(); setupPlayers=Math.max(2,Math.min(6,setupPlayers+d)); while(setupNames.length<setupPlayers)setupNames.push(""); render(); S.click(); };

window.toggleSound=()=>{ state.settings.sound=!state.settings.sound; initAudio(); syncNames(); render(); if(state.settings.sound)S.coin(); };
window.chgRounds=(d)=>{ state.settings.rounds=Math.max(1,Math.min(15,state.settings.rounds+d)); syncNames(); render(); S.click(); };
window.chgTimer=(d)=>{ state.settings.timer=Math.max(30,Math.min(180,state.settings.timer+d)); syncNames(); render(); S.click(); };

window.startGame=()=>{
  initAudio(); syncNames();
  state.players=[]; 
  for(let i=0;i<setupPlayers;i++){
    state.players.push({ name:(setupNames[i]||"Oyuncu "+(i+1)).trim()||"Oyuncu "+(i+1), color:AV_COLORS[i%AV_COLORS.length], score:0 });
  }

  state.roundNo=0;
  S.win();

};

/* ---------- YENİ TUR: harf + kategori + mod kurulumu ---------- */
function newRound(){
  state.roundNo=(state.roundNo||0)+1;
  const M=state.settings.modes;
  // kategoriler
  let cats = CATS.slice();
  if(M.surpriz){ cats=cats.concat([ SURPRISE[Math.floor(Math.random()*SURPRISE.length)] ]); }
  // harf(ler)
  const pool=HARFLER.slice();
  const l1=pool[Math.floor(Math.random()*pool.length)];
  let l2=null;
  if(M.cifte){ do{ l2=pool[Math.floor(Math.random()*pool.length)]; }while(l2===l1); }
  // her kategoriye harf ata
  const catLetter={};
  cats.forEach((c,i)=>{
    if(M.cifte){ catLetter[c.id] = i < Math.ceil(cats.length/2) ? l1 : l2; }
    else catLetter[c.id]=l1;
  });
  // bomba
  let bomb=null;
  if(M.bomba){ bomb=cats[Math.floor(Math.random()*cats.length)].id; }
  // tema
  let theme=null;
  if(M.tema){ theme=THEMES[Math.floor(Math.random()*THEMES.length)]; }

  state.round={
    cats, letters:l2?[l1,l2]:[l1], catLetter, bomb, theme,
    entries: state.players.map(()=>({})),
    entryIdx:0, results:null,
  };
  state.screen="draw";
  render();
  runSlot();
}

/* ---------- DRAW / slot animasyonu ---------- */
function viewDraw(){
  const r=state.round, M=state.settings.modes;
  const two=r.letters.length===2;
  const jokerOn = r.letters.some(l=>JOKER.has(l));
  const slots = r.letters.map((l,i)=>`
     <div class="slot spin" id="slot${i}">
       <div class="tag">${two?(i===0?'1–'+Math.ceil(r.cats.length/2):(Math.ceil(r.cats.length/2)+1)+'–'+r.cats.length):'HARF'}</div>
       <div class="lt" id="lt${i}">${l}</div>
     </div>`).join("");
  const chips=[];
  if(M.surpriz){ const sc=r.cats[r.cats.length-1]; chips.push(`<div class="chip surprise">🎁 Sürpriz: <b>${sc.name}</b></div>`); }
  if(M.tema){ chips.push(`<div class="chip theme">🌍 Tema: <b>${esc(r.theme)}</b></div>`); }
  if(M.bomba){ chips.push(`<div class="chip bombchip">💣 Bomba kuruldu — gizli</div>`); }
  return `
  <div class="center">
    <div class="roundtag">TUR ${state.roundNo} / ${state.settings.rounds}</div>
    <div class="slotwrap">${slots}</div>
    ${jokerOn?`<div class="joker-badge">🎯 JOKER HARF · o sütun 2× puan</div>`:``}
    <div class="infoline">${chips.join("")}</div>
    <div id="drawBtn" style="opacity:0;transition:opacity .3s"></div>
  </div>`;
}
function runSlot(){
  const r=state.round;
  let ticks=0; const maxTicks=18+r.letters.length*4;
  const iv=setInterval(()=>{
    r.letters.forEach((_,i)=>{ const e=el("lt"+i); if(e){ e.textContent=HARFLER[Math.floor(Math.random()*HARFLER.length)]; } });
    S.spin(); ticks++;
    if(ticks>=maxTicks){
      clearInterval(iv);
      r.letters.forEach((l,i)=>{ const e=el("lt"+i); if(e)e.textContent=l; const sl=el("slot"+i); if(sl)sl.classList.remove("spin"); });
      S.land();
      const b=el("drawBtn");
      if(b){
        b.innerHTML = state.settings.modes.sure
          ? `<button class="btn" onclick="beginCountdown()">▶️ BAŞLA · geri sayım</button>`
          : `<button class="btn" onclick="gotoEntry()">✍️ Cevapları girmeye başla</button>`;
        b.style.opacity="1";
      }
    }
  },70);
}

/* ---------- COUNTDOWN (ortak süre) ---------- */
let cdTimer=null, cdLeft=0;
window.beginCountdown=()=>{ initAudio(); state.screen="countdown"; cdLeft=state.settings.timer; render(); tickCountdown(); };
function tickCountdown(){
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    cdLeft--;
    const n=el("cdNum"), ring=el("ringFg");
    if(n){ n.textContent=cdLeft; if(cdLeft<=10)n.classList.add("warn"); }
    if(ring){ const c=2*Math.PI*100; ring.style.strokeDashoffset = c*(1-cdLeft/state.settings.timer); }
    if(cdLeft<=10 && cdLeft>0) S.tick();
    if(cdLeft<=0){ clearInterval(cdTimer); S.buzz(); setTimeout(gotoEntry,300); }
  },1000);
}
function viewCountdown(){
  const c=2*Math.PI*100;
  return `
  <div class="center">

        <circle id="ringFg" cx="115" cy="115" r="100" fill="none" stroke="#22e6ff" stroke-width="14"

/* ---------- DOĞRULAMA (hibrit) ---------- */
function localVerdict(cat,letter,word){
  // returns true / false / null(bilinmiyor→AI)
  if(!word) return false;
  if(firstChar(word)!==firstChar(letter)) return false;
  if(cat.list && LISTSET[cat.list]){
    if(LISTSET[cat.list].has(trNorm(word))) return true;
    if(!cat.open) return false;   // kapalı kategori + listede yok → yanlış
    return null;                  // açık kategori → AI'ye sor
  }
  return null; // liste yok → AI
}
async function validateRound(){
  state.screen="validating"; render();
  const r=state.round;
  // cell validity yapısı
  const valid = state.players.map(()=>({}));
  const unver = state.players.map(()=>({}));
  const need=[]; // AI'ye gidecekler
  state.players.forEach((_,pi)=>{
    r.cats.forEach(c=>{
      const w=r.entries[pi][c.id]||"";
      const v=localVerdict(c,r.catLetter[c.id],w);
      if(v===true) valid[pi][c.id]=true;
      else if(v===false) valid[pi][c.id]=false;
      else { valid[pi][c.id]=null; need.push({pi,cid:c.id,letter:r.catLetter[c.id],cat:c.name,word:w}); }
    });
  });

  if(need.length){
    let verdicts=null;
    try{ verdicts=await askAI(need); }catch(e){ verdicts=null; }
    need.forEach((it,idx)=>{
      if(verdicts && typeof verdicts[idx]==="boolean"){ valid[it.pi][it.cid]=verdicts[idx]; }
      else { valid[it.pi][it.cid]=true; unver[it.pi][it.cid]=true; } // AI yoksa: kabul et + "?" işaretle
    });
  }

  // benzersizlik
  const counts={};
  state.players.forEach((_,pi)=>r.cats.forEach(c=>{
    if(valid[pi][c.id]){ const key=c.id+"::"+trNorm(r.entries[pi][c.id]); counts[key]=(counts[key]||0)+1; }
  }));

  // puanlama
  const cellPts=state.players.map(()=>({}));
  const roundScore=state.players.map(()=>0);
  state.players.forEach((_,pi)=>r.cats.forEach(c=>{
    const w=r.entries[pi][c.id]||"";
    let pts=0;
    if(valid[pi][c.id]){
      const key=c.id+"::"+trNorm(w);
      pts = counts[key]>1 ? 5 : 10;
      if(state.settings.modes.joker && JOKER.has(r.catLetter[c.id])) pts*=2;
    } else if(state.settings.modes.bomba && c.id===r.bomb && !w){
      pts=-5;
    }
    cellPts[pi][c.id]=pts; roundScore[pi]+=pts;
  }));

  r.results={ valid, unver, cellPts, roundScore, counts,
    theme: state.players.map(()=>({})),   // grup +3 (manuel)
    sab: state.players.map(()=>false),     // sabotaj token kullanıldı mı
    streak: state.players.map(()=>false),
  };
  state.screen="reveal"; render(); S.coin();
}

async function askAI(need){
  const sys='Sen "İsim Şehir" oyununda hakemsin. Sana harf ve (kategori, kelime) çiftleri verilecek. Her kelime için o kategoriye ait GERÇEK ve GEÇERLİ bir cevap olup olmadığını değerlendir. Kelime verilen harfle başlamalı ve kategoriye uymalı. Türkçe cevapları esas al, yaygın yazım ve aksan hatalarını hoş gör. Ünlüler ve markalar gerçekten var olan/tanınan kişi veya marka olmalı; uydurma kelimeler geçersizdir. SADECE geçerli bir JSON dizisi döndür, başka hiçbir metin, açıklama veya markdown yok. Format tam olarak şöyle: [{"i":0,"ok":true},{"i":1,"ok":false}]';
  const usr = "Kontrol edilecekler:\n"+need.map((it,idx)=>`${idx}. Harf: ${it.letter} | Kategori: ${it.cat} | Kelime: "${it.word}"`).join("\n");
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
      messages:[{role:"user",content:sys+"\n\n"+usr}] })
  });
  const data=await resp.json();
  let text=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
  text=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const first=text.indexOf("["), last=text.lastIndexOf("]");
  if(first>=0&&last>=0) text=text.slice(first,last+1);
  const arr=JSON.parse(text);
  const out=new Array(need.length).fill(true);
  arr.forEach(o=>{ if(o&&typeof o.i==="number"&&typeof o.ok==="boolean") out[o.i]=o.ok; });
  return out;
}

function viewValidating(){
  return `<div class="center">
    <div class="loader"></div>
    <div class="roundtag">CEVAPLAR KONTROL EDİLİYOR</div>
    <div class="sub" style="text-align:center">Kelime listesi taranıyor, gerekirse yapay zekâ hakem devrede…</div>
  </div>`;
}

/* ---------- REVEAL ---------- */
function viewReveal(){
  const r=state.round, R=r.results, M=state.settings.modes;
  const blocks=r.cats.map(c=>{
    const L=r.catLetter[c.id]; const j=JOKER.has(L);
    const isBomb = M.bomba && c.id===r.bomb;
    const cells=state.players.map((p,pi)=>{
      const w=r.entries[pi][c.id]||"";
      const ok=R.valid[pi][c.id];
      const uv=R.unver[pi][c.id];
      let pts=R.cellPts[pi][c.id];
      const themeOn=R.theme[pi][c.id];
      const displayPts = pts + (themeOn?3:0);
      const cls = displayPts>0?"p":(displayPts<0?"neg":"z");
      const canSab = M.sabotaj && ok && !R.sab_target;
      return `<div class="acell">
        <span class="nm" style="color:${p.color}">${esc(p.name)}</span>
        <span class="wd ${ok?'':'bad'}">${w?esc(w):'<i style="opacity:.5">—</i>'}</span>
        ${uv?`<span class="unv" title="yapay zekâ doğrulaması yapılamadı">?</span>`:``}
        <span class="mark">${ok?'✅':(w?'❌':'⬜')}</span>
        ${M.tema&&ok?`<button class="starbtn ${themeOn?'on':''}" onclick="toggleTheme(${pi},'${c.id}')" title="Temaya uyuyor (+3)">🌍</button>`:``}
        ${M.sabotaj&&ok?`<button class="sabbtn" onclick="askSabotage(${pi},'${c.id}')" title="Bu cevabı çürüt">😈</button>`:``}
        <span class="pts ${cls}">${displayPts>0?'+':''}${displayPts}</span>
      </div>`;
    }).join("");
    return `<div class="revcat">
      <div class="rc-h"><span class="lb ${j?'j':''}">${L}</span>${c.icon} ${c.name}
        ${isBomb?'<span class="bombtag">💣 BOMBA</span>':''}${j?'<span class="bombtag" style="background:rgba(255,210,63,.18);color:var(--gold);border-color:rgba(255,210,63,.4)">🎯 2×</span>':''}</div>
      ${cells}
    </div>`;
  }).join("");
  const sabLeft = state.players.map((p,i)=>R.sab[i]?'':'😈').join(" ");
  return `
  <div class="brand"><div><h1 style="font-size:20px">TUR ${state.roundNo} · SONUÇ</h1></div></div>
  ${M.tema?`<div class="card" style="padding:12px 14px"><div class="sub">🌍 <b style="color:var(--lime)">Tema: ${esc(r.theme)}</b> — uyduğunu düşündüğünüz cevabın 🌍 rozetine basın, grup +3 versin.</div></div>`:''}
  ${M.sabotaj?`<div class="card" style="padding:10px 14px"><div class="sub">😈 <b>Sabotaj:</b> kalan haklar → ${state.players.map((p,i)=>`<span style="color:${p.color}">${esc(p.name)}: ${R.sab[i]?'✗':'😈'}</span>`).join(" · ")}</div></div>`:''}
  <div class="card">${blocks}</div>
  <div style="margin-top:14px"><button class="btn lime" onclick="finishRound()">📊 Puan tablosunu gör</button></div>
  <div class="foot">✅ tek başına doğru = 10 · aynısını yazan varsa = 5 · 🎯 2× · 🌍 +3 · 💣 boş = −5</div>`;
}
window.toggleTheme=(pi,cid)=>{
  const R=state.round.results; R.theme[pi][cid]=!R.theme[pi][cid]; S.click(); render();
};

/* ---------- SABOTAJ ---------- */
let sabPending=null;
window.askSabotage=(pi,cid)=>{
  const R=state.round.results;
  // sabotajı hangi oyuncu yapıyor? Basit sosyal model: hedef sahibi DIŞINDA, hakkı olan ilk oyuncuyu sormak yerine
  // grup kararıyla: onay isteyip hedefin puanını en yüksek skorlu rakibe değil, "saldıran" seçimine bırakalım.
  sabPending={pi,cid};
  const R2=R;
  const attackers=state.players.map((p,i)=>({p,i})).filter(o=>o.i!==pi && !R2.sab[o.i]);
  if(!attackers.length){ alert("Sabotaj hakkı kalan rakip yok."); return; }
  const c=state.round.cats.find(x=>x.id===cid);
  const list=attackers.map(o=>`<button class="btn sm" style="margin-top:8px;background:${o.p.color};color:#160a2e" onclick="doSabotage(${o.i})">${esc(o.p.name)} çürütüyor</button>`).join("");
  const box=document.createElement("div");
  box.id="sabModal";
  box.style.cssText="position:fixed;inset:0;background:rgba(5,2,15,.8);z-index:50;display:grid;place-items:center;padding:24px";
  box.innerHTML=`<div class="card" style="max-width:360px;width:100%">
     <div class="h">😈 Sabotaj</div>
     <div class="sub"><b>${esc(state.players[pi].name)}</b> oyuncusunun "${c.icon} ${c.name}" cevabı <b style="color:var(--danger)">${esc(state.round.entries[pi][cid])}</b> geçersiz mi? Kim itiraz ediyorsa hakkını kullansın — cevabın puanı ona geçer.</div>
     ${list}
     <button class="btn ghost sm" style="margin-top:12px" onclick="closeSab()">Vazgeç</button>
  </div>`;
  document.body.appendChild(box);
};
window.closeSab=()=>{ const m=el("sabModal"); if(m)m.remove(); sabPending=null; };
window.doSabotage=(attacker)=>{
  const {pi,cid}=sabPending; const R=state.round.results;
  const val=R.cellPts[pi][cid]; // tema bonusu henüz roundScore'a eklenmedi; sadece taban puan transfer edilir
  R.valid[pi][cid]=false; R.cellPts[pi][cid]=0; R.theme[pi][cid]=false;
  R.roundScore[pi]-=val;
  R.roundScore[attacker]+=Math.max(0,val);  // çalınan puan
  R.stolen=R.stolen||[]; R.stolen.push(attacker+"<-"+pi);
  R.sab[attacker]=true;
  closeSab(); S.bad(); setTimeout(S.coin,200); render();
};

/* ---------- TUR BİTİMİ: puanları işle ---------- */
window.finishRound=()=>{
  const r=state.round, R=r.results;
  // tema bonusunu roundScore'a ekle
  state.players.forEach((_,pi)=>{
    let tb=0; r.cats.forEach(c=>{ if(R.theme[pi][c.id]) tb+=3; });
    R.roundScore[pi]+=tb; R.themeBonus=R.themeBonus||[]; R.themeBonus[pi]=tb;
  });
  // seri bonusu
  const max=Math.max(...R.roundScore);
  const winnersThis=state.players.map((_,i)=>R.roundScore[i]===max && max>0);
  if(state.settings.modes.seri){
    winnersThis.forEach((w,i)=>{ if(w && state.wonLast[i]){ R.roundScore[i]+=15; R.streak[i]=true; } });
  }
  state.wonLast=winnersThis.slice();
  // toplamlara ekle
  state.players.forEach((p,i)=> p.score+=R.roundScore[i]);
  state.screen="score"; render();
  if(state.roundNo>=state.settings.rounds) S.win(); else S.coin();
};

/* ---------- SCOREBOARD ---------- */
function viewScore(){
  const R=state.round.results;
  const order=state.players.map((p,i)=>({p,i})).sort((a,b)=>b.p.score-a.p.score);
  const last=state.roundNo>=state.settings.rounds;
  const rows=order.map((o,rank)=>{
    const medal=["🥇","🥈","🥉"][rank]||(rank+1);
    return `<div class="lb-row ${rank===0?'lead':''}">
      <div class="rk">${medal}</div>
      <div class="av" style="background:${o.p.color}">${initials(o.p.name)}</div>
      <div class="nm">${esc(o.p.name)}
        <div class="delta">+${R.roundScore[o.i]} bu tur ${R.streak[o.i]?'<span class="streakbadge">🔥 SERİ +15</span>':''}${R.themeBonus&&R.themeBonus[o.i]?` · 🌍+${R.themeBonus[o.i]}`:''}</div>
      </div>
      <div class="sc">${o.p.score}</div>
    </div>`;
  }).join("");
  return `
  <div class="brand"><div><h1 style="font-size:20px">PUAN TABLOSU</h1><small>tur ${state.roundNo} / ${state.settings.rounds} bitti</small></div></div>
  <div class="card">${rows}</div>
  <div style="margin-top:16px">
    ${last
      ? `<button class="btn gold" style="background:linear-gradient(180deg,var(--gold),#ff9d3f);color:#3a2100" onclick="endGame()">🏆 Şampiyonu gör</button>`
      : `<button class="btn" onclick="newRound()">🎲 Sonraki tur</button>`}
  </div>
  <div style="margin-top:10px"><button class="btn ghost sm" onclick="quitConfirm()">Oyunu bitir</button></div>
  <div class="foot">İsim Şehir · Kaos</div>`;
}
window.quitConfirm=()=>{ if(confirm("Oyunu şimdi bitirip şampiyonu görmek istiyor musun?")) endGame(); };

/* ---------- GAME OVER ---------- */
window.endGame=()=>{ state.screen="gameover"; render(); confetti(); S.win(); };
function viewGameOver(){
  const order=state.players.slice().sort((a,b)=>b.score-a.score);
  const champ=order[0];
  const rows=order.map((p,i)=>`
    <div class="lb-row ${i===0?'lead':''}">
      <div class="rk">${["🥇","🥈","🥉"][i]||(i+1)}</div>
      <div class="av" style="background:${p.color}">${initials(p.name)}</div>
      <div class="nm">${esc(p.name)}</div>
      <div class="sc">${p.score}</div>
    </div>`).join("");
  return `
  <div class="center" style="min-height:auto">
    <div style="text-align:center;margin-top:10px">
      <div style="font-size:56px">🏆</div>
      <div class="display" style="font-size:30px;color:var(--gold);text-shadow:0 0 30px rgba(255,210,63,.5)">${esc(champ.name)}</div>
      <div class="sub">${champ.score} puanla ŞAMPİYON!</div>
    </div>
    <div class="card">${rows}</div>
    <div class="row">
      <button class="btn cyan" onclick="rematch()">🔁 Aynı kadro, tekrar</button>
      <button class="btn ghost" onclick="location.reload()">⚙️ Yeni kurulum</button>
    </div>
  </div>`;
}
window.rematch=()=>{ state.players.forEach(p=>p.score=0); state.wonLast=state.players.map(()=>false); state.roundNo=0; S.win(); newRound(); };

/* ---------- confetti ---------- */
function confetti(){
  const box=el("confetti"); box.innerHTML="";
  const cols=["#ff2d95","#22e6ff","#b6ff3a","#ffd23f","#a06bff"];
  for(let i=0;i<90;i++){
    const d=document.createElement("div"); d.className="conf";
    d.style.left=Math.random()*100+"vw";
    d.style.background=cols[i%cols.length];
    d.style.animationDuration=(2+Math.random()*2)+"s";
    d.style.animationDelay=(Math.random()*.6)+"s";
    d.style.transform="rotate("+Math.random()*360+"deg)";
    box.appendChild(d);
  }
  setTimeout(()=>{box.innerHTML="";},4200);
}

/* ---------- başlat ---------- */
document.addEventListener("click",initAudio,{once:true});
render();
</script>
